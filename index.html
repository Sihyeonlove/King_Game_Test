<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#7c3aed">
<title>왕게임 PWA</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--bg:#0b1020;--card:#151c31;--accent:#7c3aed;--gold:#fbbf24;--text:#f8fafc}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,sans-serif;background:linear-gradient(180deg,#111827,#0b1020);color:var(--text)}
.wrap{max-width:600px;margin:auto;padding:18px}
.card{background:var(--card);padding:18px;border-radius:22px;margin:12px 0;box-shadow:0 10px 30px rgba(0,0,0,.35)}
h1,h2{text-align:center}
input,select,button{width:100%;padding:14px;border-radius:14px;border:none;margin:6px 0}
input,select{background:#222b46;color:white}
button{background:var(--accent);color:white;font-weight:700}
.gold{background:var(--gold);color:black}
.player,.item{display:flex;justify-content:space-between;background:#202946;padding:10px;border-radius:12px;margin:6px 0}
.hidden{display:none}
.king{font-size:2rem;color:var(--gold);text-align:center;font-weight:800}
.small{text-align:center;color:#b7c0d8}
</style>
</head>
<body>
<div class="wrap">

<div id="setup" class="card">
<h1>👑 왕게임</h1>
<input id="nick" placeholder="닉네임">
<select id="gender">
<option>남</option>
<option>여</option>
</select>
<button onclick="addPlayer()">참가자 추가</button>
<div id="players"></div>
<button class="gold" onclick="startGame()">게임 시작</button>
</div>

<div id="kingScreen" class="card hidden">
<h2>왕 정보</h2>
<div class="king">👑 <span id="kingName"></span></div>
<p class="small">왕은 번호에서 제외됩니다.</p>
<div id="numberList"></div>
<button class="gold" onclick="revealAll()">번호 공개</button>
</div>

<div id="revealScreen" class="card hidden">
<h2>번호 공개</h2>
<div id="revealList"></div>
<button onclick="startGame()">다시 뽑기</button>
</div>

</div>

<script>
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}

const vibrate=(p)=>navigator.vibrate&&navigator.vibrate(p);

let players=[];

function addPlayer(){
 const n=nick.value.trim();
 if(!n) return;
 players.push({name:n,gender:gender.value});
 nick.value="";
 renderPlayers();
 vibrate(40);
}

function renderPlayers(){
 playersEl=document.getElementById("players");
 playersEl.innerHTML=players.map((p,i)=>`
 <div class="player">
   <span>${p.name}</span>
   <span>${p.gender}</span>
 </div>`).join("");
}

function shuffle(a){
 a=[...a];
 for(let i=a.length-1;i>0;i--){
  let j=Math.floor(Math.random()*(i+1));
  [a[i],a[j]]=[a[j],a[i]];
 }
 return a;
}

let king=null;
let numbered=[];

function startGame(){
 if(players.length<3){
   alert("왕 제외 번호 배정을 위해 최소 3명 이상 필요합니다.");
   return;
 }

 king=players[Math.floor(Math.random()*players.length)];

 const others=players.filter(p=>p!==king);
 numbered=shuffle(others).map((p,i)=>({
   number:i+1,
   ...p
 }));

 document.getElementById("kingName").textContent=king.name;

 numberList.innerHTML=numbered.map(p=>
 `<div class="item"><span>${p.number}번</span><span>${p.gender}</span></div>`
 ).join("");

 setup.classList.add("hidden");
 revealScreen.classList.add("hidden");
 kingScreen.classList.remove("hidden");

 vibrate([100,50,100,50,250]);
}

function revealAll(){
 revealList.innerHTML=numbered.map(p=>
 `<div class="item"><strong>${p.number}번</strong><span>${p.name} (${p.gender})</span></div>`
 ).join("");

 kingScreen.classList.add("hidden");
 revealScreen.classList.remove("hidden");

 vibrate([200,80,200,80,300]);
}
</script>
</body>
</html>
